<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bgPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dde4f5"/>
      <stop offset="100%" style="stop-color:#e8eaf8"/>
    </linearGradient>
    <linearGradient id="whiteCard" x1="0%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f2fa"/>
    </linearGradient>
    <linearGradient id="pinkCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b8a"/>
      <stop offset="100%" style="stop-color:#ff4d6e"/>
    </linearGradient>
    <linearGradient id="blueGear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4da8ff"/>
      <stop offset="100%" style="stop-color:#1a7ef0"/>
    </linearGradient>
    <linearGradient id="gmailRed" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#ea4335"/>
      <stop offset="100%" style="stop-color:#c5221f"/>
    </linearGradient>
    <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#9bacd8" flood-opacity="0.35"/>
    </filter>
    <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#9bacd8" flood-opacity="0.4"/>
    </filter>
    <filter id="gearShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4da8ff" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bgPurple)"/>

  <!-- Main Gmail-style card (center, slightly rotated) -->
  <g transform="translate(250, 240) rotate(-2)">
    <rect x="-110" y="-110" width="220" height="220" rx="40" fill="url(#whiteCard)" filter="url(#cardShadow)"/>
    <!-- Gmail M shape -->
    <!-- Red left panel of M -->
    <path d="M -72 -50 L -72 50 L -20 8 L -20 -8 Z" fill="#ea4335"/>
    <!-- Blue right panel of M -->
    <path d="M 72 -50 L 72 50 L 20 8 L 20 -8 Z" fill="#4285f4"/>
    <!-- Red top-left flap -->
    <path d="M -72 -50 L 0 10 L 72 -50 Z" fill="#c5221f"/>
    <!-- Green bottom right -->
    <path d="M 72 50 L 20 8 L 0 24 Z" fill="#34a853"/>
    <!-- Yellow bottom left -->
    <path d="M -72 50 L -20 8 L 0 24 Z" fill="#fbbc04"/>
    <!-- White envelope body -->
    <rect x="-72" y="-50" width="144" height="100" rx="4" fill="none" stroke="none"/>
    <!-- M letter white overlay lines for authenticity -->
    <path d="M -72 -50 L 0 10 L 72 -50 L 72 50 L 20 8 L 0 24 L -20 8 L -72 50 Z" fill="none" stroke="white" stroke-width="2"/>
  </g>

  <!-- Pink support icon (bottom-left, rotated) -->
  <g transform="translate(155, 340) rotate(-8)">
    <rect x="-55" y="-55" width="110" height="110" rx="24" fill="url(#pinkCard)" filter="url(#smallShadow)"/>
    <!-- Chat bubble icon -->
    <circle cx="0" cy="-5" r="28" fill="white" opacity="0.95"/>
    <polygon points="0,20 -12,30 8,30" fill="white" opacity="0.95"/>
    <!-- Dots inside bubble -->
    <circle cx="-10" cy="-5" r="4" fill="#ff4d6e"/>
    <circle cx="0" cy="-5" r="4" fill="#ff4d6e"/>
    <circle cx="10" cy="-5" r="4" fill="#ff4d6e"/>
    <!-- Circular arrow around bubble -->
    <path d="M -30 -5 A 30 30 0 1 1 30 -5" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <polygon points="30,-5 38,2 24,2" fill="white" opacity="0.7"/>
  </g>

  <!-- Blue gear icon (top-right) -->
  <g transform="translate(360, 140)" filter="url(#gearShadow)">
    <!-- Gear body -->
    <g fill="url(#blueGear)">
      <!-- Center circle -->
      <circle cx="0" cy="0" r="18"/>
      <!-- Gear teeth -->
      <rect x="-8" y="-38" width="16" height="20" rx="4"/>
      <rect x="-8" y="18" width="16" height="20" rx="4"/>
      <rect x="18" y="-8" width="20" height="16" rx="4"/>
      <rect x="-38" y="-8" width="20" height="16" rx="4"/>
      <!-- Diagonal teeth -->
      <rect x="16" y="-34" width="16" height="14" rx="4" transform="rotate(45 24 -27)"/>
      <rect x="-32" y="20" width="16" height="14" rx="4" transform="rotate(45 -24 27)"/>
      <rect x="16" y="20" width="16" height="14" rx="4" transform="rotate(-45 24 27)"/>
      <rect x="-32" y="-34" width="16" height="14" rx="4" transform="rotate(-45 -24 -27)"/>
    </g>
    <!-- Center hole -->
    <circle cx="0" cy="0" r="10" fill="#dde4f5"/>
    <circle cx="0" cy="0" r="6" fill="url(#blueGear)" opacity="0.5"/>
  </g>

  <!-- Subtle reflection/highlight on main card -->
  <g transform="translate(250, 240) rotate(-2)">
    <rect x="-108" y="-108" width="216" height="60" rx="38" fill="white" opacity="0.12"/>
  </g>
</svg>

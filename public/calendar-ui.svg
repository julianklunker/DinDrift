<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>
    <linearGradient id="sidebarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#091220"/>
      <stop offset="100%" style="stop-color:#0d1a30"/>
    </linearGradient>
    <linearGradient id="eventGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4fd6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="eventGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d55d8"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a3a8f" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="url(#bgGrad)" rx="16"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="150" height="520" fill="url(#sidebarGrad)" rx="16"/>
  <rect x="134" y="0" width="16" height="520" fill="url(#sidebarGrad)"/>

  <!-- Sidebar items -->
  <!-- Calendar (active) -->
  <rect x="12" y="86" width="126" height="36" rx="10" fill="#1a3a6e" opacity="0.8"/>
  <rect x="14" y="88" width="3" height="32" rx="2" fill="#3b82f6"/>
  <!-- Calendar icon -->
  <rect x="24" y="96" width="16" height="16" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="28" y1="94" x2="28" y2="98" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="36" y1="94" x2="36" y2="98" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="24" y1="102" x2="40" y2="102" stroke="#3b82f6" stroke-width="1"/>
  <text x="46" y="107" fill="#60a5fa" font-size="12" font-family="Inter, system-ui, sans-serif" font-weight="600">Calendar</text>

  <!-- Schedule -->
  <rect x="24" y="138" width="16" height="16" rx="2" fill="none" stroke="#4b6fa8" stroke-width="1.5"/>
  <line x1="27" y1="143" x2="37" y2="143" stroke="#4b6fa8" stroke-width="1"/>
  <line x1="27" y1="147" x2="37" y2="147" stroke="#4b6fa8" stroke-width="1"/>
  <line x1="27" y1="151" x2="33" y2="151" stroke="#4b6fa8" stroke-width="1"/>
  <text x="46" y="149" fill="#4b6fa8" font-size="12" font-family="Inter, system-ui, sans-serif">Schedule</text>

  <!-- Settings -->
  <circle cx="32" cy="186" r="7" fill="none" stroke="#4b6fa8" stroke-width="1.5"/>
  <circle cx="32" cy="186" r="3" fill="none" stroke="#4b6fa8" stroke-width="1.5"/>
  <text x="46" y="190" fill="#4b6fa8" font-size="12" font-family="Inter, system-ui, sans-serif">Settings</text>

  <!-- Main area -->
  <!-- Header -->
  <text x="168" y="48" fill="#e2e8f0" font-size="22" font-family="Inter, system-ui, sans-serif" font-weight="700">Calendar</text>

  <!-- Today button -->
  <rect x="694" y="22" width="76" height="34" rx="17" fill="none" stroke="#2d4a7a" stroke-width="1.5"/>
  <text x="732" y="43" fill="#94b4d4" font-size="13" font-family="Inter, system-ui, sans-serif" text-anchor="middle">Today</text>
  <!-- Arrows -->
  <text x="670" y="44" fill="#94b4d4" font-size="16" font-family="monospace">‹</text>
  <text x="775" y="44" fill="#94b4d4" font-size="16" font-family="monospace">›</text>

  <!-- Day headers -->
  <line x1="150" y1="70" x2="800" y2="70" stroke="#1a2d4a" stroke-width="1"/>
  <text x="228" y="90" fill="#94b4d4" font-size="12" font-family="Inter, system-ui, sans-serif" text-anchor="middle">Mon</text>
  <text x="338" y="90" fill="#94b4d4" font-size="12" font-family="Inter, system-ui, sans-serif" text-anchor="middle">Tue</text>
  <text x="448" y="90" fill="#94b4d4" font-size="12" font-family="Inter, system-ui, sans-serif" text-anchor="middle">Wed</text>
  <text x="558" y="90" fill="#94b4d4" font-size="12" font-family="Inter, system-ui, sans-serif" text-anchor="middle">Thu</text>
  <text x="668" y="90" fill="#94b4d4" font-size="12" font-family="Inter, system-ui, sans-serif" text-anchor="middle">Fri</text>
  <text x="748" y="90" fill="#4b6fa8" font-size="12" font-family="Inter, system-ui, sans-serif" text-anchor="middle">Sat</text>

  <!-- Time labels -->
  <text x="159" y="130" fill="#4b6fa8" font-size="10" font-family="Inter, system-ui, sans-serif" text-anchor="end">8 AM</text>
  <text x="159" y="175" fill="#4b6fa8" font-size="10" font-family="Inter, system-ui, sans-serif" text-anchor="end">9 AM</text>
  <text x="159" y="220" fill="#4b6fa8" font-size="10" font-family="Inter, system-ui, sans-serif" text-anchor="end">10 AM</text>
  <text x="159" y="265" fill="#4b6fa8" font-size="10" font-family="Inter, system-ui, sans-serif" text-anchor="end">11 AM</text>
  <text x="159" y="310" fill="#4b6fa8" font-size="10" font-family="Inter, system-ui, sans-serif" text-anchor="end">12 PM</text>
  <text x="159" y="355" fill="#4b6fa8" font-size="10" font-family="Inter, system-ui, sans-serif" text-anchor="end">1 PM</text>
  <text x="159" y="400" fill="#4b6fa8" font-size="10" font-family="Inter, system-ui, sans-serif" text-anchor="end">2 PM</text>
  <text x="159" y="445" fill="#4b6fa8" font-size="10" font-family="Inter, system-ui, sans-serif" text-anchor="end">3 PM</text>
  <text x="159" y="490" fill="#4b6fa8" font-size="10" font-family="Inter, system-ui, sans-serif" text-anchor="end">4 PM</text>

  <!-- Grid lines (horizontal) -->
  <line x1="162" y1="125" x2="795" y2="125" stroke="#1a2d4a" stroke-width="0.5"/>
  <line x1="162" y1="170" x2="795" y2="170" stroke="#1a2d4a" stroke-width="0.5"/>
  <line x1="162" y1="215" x2="795" y2="215" stroke="#1a2d4a" stroke-width="0.5"/>
  <line x1="162" y1="260" x2="795" y2="260" stroke="#1a2d4a" stroke-width="0.5"/>
  <line x1="162" y1="305" x2="795" y2="305" stroke="#1a2d4a" stroke-width="0.5"/>
  <line x1="162" y1="350" x2="795" y2="350" stroke="#1a2d4a" stroke-width="0.5"/>
  <line x1="162" y1="395" x2="795" y2="395" stroke="#1a2d4a" stroke-width="0.5"/>
  <line x1="162" y1="440" x2="795" y2="440" stroke="#1a2d4a" stroke-width="0.5"/>
  <line x1="162" y1="485" x2="795" y2="485" stroke="#1a2d4a" stroke-width="0.5"/>

  <!-- Grid lines (vertical) -->
  <line x1="283" y1="100" x2="283" y2="510" stroke="#1a2d4a" stroke-width="0.5"/>
  <line x1="393" y1="100" x2="393" y2="510" stroke="#1a2d4a" stroke-width="0.5"/>
  <line x1="503" y1="100" x2="503" y2="510" stroke="#1a2d4a" stroke-width="0.5"/>
  <line x1="613" y1="100" x2="613" y2="510" stroke="#1a2d4a" stroke-width="0.5"/>
  <line x1="723" y1="100" x2="723" y2="510" stroke="#1a2d4a" stroke-width="0.5"/>

  <!-- EVENT: Mon Team Sync 10-12 -->
  <rect x="168" y="215" width="110" height="88" rx="10" fill="url(#eventGrad)" filter="url(#shadow)" opacity="0.92"/>
  <rect x="168" y="215" width="110" height="88" rx="10" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
  <text x="223" y="254" fill="white" font-size="11" font-family="Inter, system-ui, sans-serif" font-weight="600" text-anchor="middle">Team Sync</text>
  <text x="223" y="270" fill="#93c5fd" font-size="9" font-family="Inter, system-ui, sans-serif" text-anchor="middle">10:00 – 12:00</text>

  <!-- EVENT: Tue Client Call 12-3 -->
  <rect x="293" y="305" width="95" height="133" rx="10" fill="url(#eventGrad2)" filter="url(#shadow)" opacity="0.92"/>
  <rect x="293" y="305" width="95" height="133" rx="10" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
  <text x="340" y="365" fill="white" font-size="11" font-family="Inter, system-ui, sans-serif" font-weight="600" text-anchor="middle">Client Call</text>
  <text x="340" y="381" fill="#93c5fd" font-size="9" font-family="Inter, system-ui, sans-serif" text-anchor="middle">12:00 – 15:00</text>

  <!-- EVENT: Wed Team Sync 9-11 -->
  <rect x="403" y="170" width="95" height="88" rx="10" fill="url(#eventGrad)" filter="url(#shadow)" opacity="0.92"/>
  <rect x="403" y="170" width="95" height="88" rx="10" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
  <text x="450" y="209" fill="white" font-size="11" font-family="Inter, system-ui, sans-serif" font-weight="600" text-anchor="middle">Team Sync</text>
  <text x="450" y="225" fill="#93c5fd" font-size="9" font-family="Inter, system-ui, sans-serif" text-anchor="middle">9:00 – 11:00</text>

  <!-- EVENT: Wed Project Review 4-5 -->
  <rect x="403" y="440" width="95" height="55" rx="10" fill="url(#eventGrad2)" filter="url(#shadow)" opacity="0.92"/>
  <rect x="403" y="440" width="95" height="55" rx="10" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
  <text x="450" y="463" fill="white" font-size="11" font-family="Inter, system-ui, sans-serif" font-weight="600" text-anchor="middle">Project</text>
  <text x="450" y="478" fill="white" font-size="11" font-family="Inter, system-ui, sans-serif" font-weight="600" text-anchor="middle">Review</text>

  <!-- EVENT: Thu Project Review 1-2 -->
  <rect x="518" y="350" width="90" height="55" rx="10" fill="url(#eventGrad)" filter="url(#shadow)" opacity="0.92"/>
  <rect x="518" y="350" width="90" height="55" rx="10" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
  <text x="563" y="373" fill="white" font-size="11" font-family="Inter, system-ui, sans-serif" font-weight="600" text-anchor="middle">Project</text>
  <text x="563" y="388" fill="white" font-size="11" font-family="Inter, system-ui, sans-serif" font-weight="600" text-anchor="middle">Review</text>

  <!-- EVENT: Fri Client Call 10-12 -->
  <rect x="628" y="215" width="90" height="66" rx="10" fill="url(#eventGrad2)" filter="url(#shadow)" opacity="0.92"/>
  <rect x="628" y="215" width="90" height="66" rx="10" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
  <text x="673" y="252" fill="white" font-size="11" font-family="Inter, system-ui, sans-serif" font-weight="600" text-anchor="middle">Client Call</text>

  <!-- EVENT: Fri Team Sync 2-3 -->
  <rect x="628" y="395" width="90" height="55" rx="10" fill="url(#eventGrad)" filter="url(#shadow)" opacity="0.92"/>
  <rect x="628" y="395" width="90" height="55" rx="10" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
  <text x="673" y="426" fill="white" font-size="11" font-family="Inter, system-ui, sans-serif" font-weight="600" text-anchor="middle">Team Sync</text>

  <!-- Corner radius clip -->
  <rect x="0" y="0" width="800" height="520" fill="none" rx="16" stroke="#1a3a6e" stroke-width="1"/>
</svg>
